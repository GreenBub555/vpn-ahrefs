<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>VPN → Ahrefs</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  html, body {
    height: 100%;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f5f5f5;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    padding: 32px 40px;
    text-align: center;
    max-width: 360px;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 20px;
    color: #1a1a1a;
  }
  button {
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
</style>
</head>
<body>

<div class="card">
  <h1>Не забудь включить VPN</h1>
  <button id="okBtn">OK</button>
</div>

<script>
  document.getElementById('okBtn').addEventListener('click', function () {
    window.location.href = 'https://app.ahrefs.com/dashboard';
  });
</script>

</body>
</html>
